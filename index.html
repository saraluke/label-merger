<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Label Merger — Sara Luke Creative</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root {
    --navy: #394350;
    --pink-light: #F3C4D6;
    --pink-dark: #D56D85;
    --green: #58634F;
    --tan: #E49855;
    --bg: #f5f5f0;
    --text: #2a2a2a;
    --muted: #888;
    --border: #ddd;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--navy);
    color: white;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  header .subtitle {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--pink-light);
    margin-top: 2px;
  }

  .main {
    max-width: 680px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .card {
    background: var(--white);
    border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    padding: 28px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--navy);
    margin-bottom: 18px;
  }

  .field-label {
    display: block;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 7px;
  }

  textarea {
    width: 100%;
    height: 210px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 0.78rem;
    font-family: ui-monospace, monospace;
    color: var(--text);
    resize: vertical;
    line-height: 1.7;
    transition: border-color 0.15s;
  }

  textarea:focus {
    outline: none;
    border-color: var(--pink-dark);
  }

  .hint {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }

  .merge-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }

  .merge-btn:hover:not(:disabled) {
    background: #2a323e;
  }

  .merge-btn:disabled {
    background: #aaa;
    cursor: not-allowed;
  }

  #status {
    margin-top: 16px;
    font-size: 0.78rem;
    font-weight: 600;
    min-height: 22px;
    text-align: center;
    letter-spacing: 0.02em;
  }

  #status.error   { color: #c0392b; }
  #status.success { color: var(--green); }
  #status.working { color: var(--tan); }

  .progress-bar-wrap {
    margin-top: 12px;
    background: #eee;
    border-radius: 99px;
    height: 5px;
    overflow: hidden;
    display: none;
  }

  .progress-bar {
    height: 100%;
    background: var(--pink-dark);
    border-radius: 99px;
    width: 0%;
    transition: width 0.2s;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Sara Luke Creative</h1>
    <div class="subtitle">Label Merger</div>
  </div>
</header>

<div class="main">
  <div class="card">
    <div class="card-title">Merge Shipping Labels</div>

    <label class="field-label" for="urls">ShipEngine Label URLs</label>
    <textarea id="urls" placeholder="Paste URLs here, one per line.

chrome-extension://efaidnbm.../https://api.shipengine.com/v1/downloads/...
chrome-extension://efaidnbm.../https://api.shipengine.com/v1/downloads/..."></textarea>
    <p class="hint">Chrome-extension:// prefixes are stripped automatically.</p>

    <button class="merge-btn" id="mergeBtn">Merge &amp; Download PDF</button>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
  var PROXY_URL = 'https://dropbox-pdf-proxy.sara-5fa.workers.dev/';

  function cleanUrl(raw) {
    raw = raw.trim();
    var match = raw.match(/chrome-extension:\/\/[^/]+\/(.+)/);
    if (match) return match[1];
    return raw;
  }

  async function fetchPdfViaProxy(url, index, total) {
    setStatus('Downloading label ' + (index + 1) + ' of ' + total + '…', 'working');
    setProgress((index / total) * 100);

    var proxyUrl = PROXY_URL + '?url=' + encodeURIComponent(url);
    var response = await fetch(proxyUrl);
    if (!response.ok) throw new Error('Label ' + (index + 1) + ' failed: HTTP ' + response.status);
    return await response.arrayBuffer();
  }

  async function merge() {
    var raw = document.getElementById('urls').value.trim();
    if (!raw) {
      setStatus('Please paste at least one URL.', 'error');
      return;
    }

    var lines = raw.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
    var urls = lines.map(cleanUrl).filter(function(u) { return u.startsWith('http'); });

    if (urls.length === 0) {
      setStatus('No valid URLs found. Make sure each line starts with http.', 'error');
      return;
    }

    var btn = document.getElementById('mergeBtn');
    btn.disabled = true;
    document.getElementById('progressWrap').style.display = 'block';
    setStatus('Starting download of ' + urls.length + ' label' + (urls.length > 1 ? 's' : '') + '…', 'working');

    try {
      var merged = await PDFLib.PDFDocument.create();

      for (var i = 0; i < urls.length; i++) {
        var bytes = await fetchPdfViaProxy(urls[i], i, urls.length);
        var src = await PDFLib.PDFDocument.load(bytes);
        var pages = await merged.copyPages(src, src.getPageIndices());
        pages.forEach(function(p) { merged.addPage(p); });
      }

      setProgress(100);

      var pdfBytes = await merged.save();
      var blob = new Blob([pdfBytes], { type: 'application/pdf' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      var today = new Date().toISOString().slice(0, 10);
      a.download = 'labels-' + today + '.pdf';
      a.click();

      setStatus('✓ Saved as labels-' + today + '.pdf', 'success');
    } catch (err) {
      setStatus('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      setProgress(0);
      setTimeout(function() {
        document.getElementById('progressWrap').style.display = 'none';
      }, 1500);
    }
  }

  function setStatus(msg, cls) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = cls || '';
  }

  function setProgress(pct) {
    document.getElementById('progressBar').style.width = pct + '%';
  }

  document.getElementById('mergeBtn').addEventListener('click', merge);
</script>

</body>
</html>
